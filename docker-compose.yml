name: ai-yanchuaner

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm-database@sha256:64d3547e0b131bf4638342e52c12bc46d6f1d9b8498e4b731ff31be5ab316ea9
    restart: unless-stopped
    command: ["--config=/app/config.yaml", "--port=4000"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-${LITELLM_MASTER_KEY}}
      STORE_MODEL_IN_DB: "True"
    volumes:
      - ./gateway/config.yaml:/app/config.yaml:ro
    mem_limit: 1536m
    logging: *default-logging
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  open-webui:
    image: ghcr.io/open-webui/open-webui@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${OPENWEBUI_LITELLM_KEY}
      ENABLE_OPENAI_API: "True"
      ENABLE_OPENAI_API_PASSTHROUGH: "False"
      ENABLE_OLLAMA_API: "False"
      ENABLE_IMAGE_GENERATION: "True"
      ENABLE_IMAGE_PROMPT_GENERATION: "False"
      IMAGE_GENERATION_ENGINE: openai
      IMAGE_GENERATION_MODEL: gpt-image-2
      IMAGE_SIZE: 1024x1024
      IMAGES_OPENAI_API_BASE_URL: http://litellm:4000/v1
      IMAGES_OPENAI_API_KEY: ${OPENWEBUI_IMAGE_LITELLM_KEY}
      IMAGES_OPENAI_PARAMS: '{"quality":"low"}'
      RAG_EMBEDDING_ENGINE: openai
      RAG_EMBEDDING_MODEL: text-embedding-3-small
      RAG_OPENAI_API_BASE_URL: http://litellm:4000/v1
      RAG_OPENAI_API_KEY: ${OPENWEBUI_LITELLM_KEY}
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      WEBUI_NAME: "燕中 AI"
      WEBUI_URL: ${OPENWEBUI_URL:-http://localhost:3000}
      ENABLE_SIGNUP: ${OPENWEBUI_ENABLE_SIGNUP:-False}
      DEFAULT_USER_ROLE: pending
      CORS_ALLOW_ORIGIN: ${OPENWEBUI_CORS_ALLOW_ORIGIN:-http://localhost:3000}
      USER_AGENT: ai-yanchuaner-open-webui/0.1
    volumes:
      - open_webui_data:/app/backend/data
    mem_limit: 1g
    logging: *default-logging
    ports:
      - "127.0.0.1:${OPENWEBUI_HOST_PORT:-3000}:8080"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  postgres_data:
  open_webui_data:
