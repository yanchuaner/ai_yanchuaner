name: ai-yanchuaner

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  ai-web:
    profiles: ["yancore"]
    build:
      context: .
      dockerfile: apps/ai-web/Dockerfile
    image: ai-yanchuaner/ai-web:phase-1
    restart: unless-stopped
    environment:
      AI_WEB_PUBLIC_URL: ${AI_WEB_PUBLIC_URL:-http://localhost:3002}
      AI_WEB_SESSION_SECRET: ${AI_WEB_SESSION_SECRET:-}
      AI_WEB_ALLOW_INSECURE_INTERNAL_HTTP: ${AI_WEB_ALLOW_INSECURE_INTERNAL_HTTP:-false}
      YANCORE_OIDC_ISSUER: ${YANCORE_OIDC_ISSUER:-http://localhost:3000}
      YANCORE_OIDC_DISCOVERY_URL: ${YANCORE_OIDC_DISCOVERY_URL:-http://host.docker.internal:3000/api/oauth/.well-known/openid-configuration}
      YANCORE_OIDC_CLIENT_ID: ${YANCORE_OIDC_CLIENT_ID:-}
      YANCORE_OIDC_CLIENT_SECRET: ${YANCORE_OIDC_CLIENT_SECRET:-}
      YANCORE_API_BASE_URL: ${YANCORE_API_BASE_URL:-http://api-gateway:3000}
      YANCORE_SUBJECT_EXCHANGE_CLIENT_ID: ${YANCORE_SUBJECT_EXCHANGE_CLIENT_ID:-ai-yancore-bff}
      YANCORE_SUBJECT_EXCHANGE_CLIENT_SECRET: ${YANCORE_SUBJECT_EXCHANGE_CLIENT_SECRET:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 512m
    logging: *default-logging
    networks:
      - ai-core
    ports:
      - "127.0.0.1:${AI_WEB_HOST_PORT:-3002}:3001"
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)})"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  db:
    image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 256m
    logging: *default-logging
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm-database@sha256:64d3547e0b131bf4638342e52c12bc46d6f1d9b8498e4b731ff31be5ab316ea9
    restart: unless-stopped
    command: ["--config=/app/config.yaml", "--port=4000"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      UI_USERNAME: ${LITELLM_UI_USERNAME:-admin}
      UI_PASSWORD: ${LITELLM_UI_PASSWORD:-${LITELLM_MASTER_KEY}}
      STORE_MODEL_IN_DB: "True"
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
    volumes:
      - ./gateway/config.yaml:/app/config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LITELLM_HOST_BIND:-127.0.0.1}:${LITELLM_HOST_PORT:-4000}:4000"
    mem_limit: 1536m
    logging: *default-logging
    networks:
      data:
      ai-core:
        aliases:
          - litellm-gateway
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2@sha256:9fcea9c6e32ab60b0498f3986c6cdf651ddbe61db48d2213a3d28048ddd673d4
    restart: unless-stopped
    environment:
      OPENAI_API_BASE_URL: ${API_GATEWAY_BASE_URL:-http://api-gateway:3000/v1}
      OPENAI_API_KEY: ${OPENWEBUI_API_KEY:?OPENWEBUI_API_KEY is required}
      ENABLE_OPENAI_API: "True"
      ENABLE_OPENAI_API_PASSTHROUGH: "False"
      ENABLE_OLLAMA_API: "False"
      ENABLE_IMAGE_GENERATION: "True"
      ENABLE_IMAGE_PROMPT_GENERATION: "False"
      IMAGE_GENERATION_ENGINE: openai
      IMAGE_GENERATION_MODEL: gpt-image-2
      IMAGE_SIZE: 1024x1024
      IMAGES_OPENAI_API_BASE_URL: ${API_GATEWAY_BASE_URL:-http://api-gateway:3000/v1}
      IMAGES_OPENAI_API_KEY: ${OPENWEBUI_IMAGE_API_KEY:-${OPENWEBUI_API_KEY}}
      IMAGES_OPENAI_PARAMS: '{"quality":"low"}'
      RAG_EMBEDDING_ENGINE: openai
      RAG_EMBEDDING_MODEL: text-embedding-3-small
      RAG_OPENAI_API_BASE_URL: ${API_GATEWAY_BASE_URL:-http://api-gateway:3000/v1}
      RAG_OPENAI_API_KEY: ${OPENWEBUI_API_KEY}
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${OPENWEBUI_SECRET_KEY}
      WEBUI_NAME: "燕中 AI"
      WEBUI_URL: ${OPENWEBUI_URL:-http://localhost:3000}
      ENABLE_SIGNUP: ${OPENWEBUI_ENABLE_SIGNUP:-False}
      ENABLE_LOGIN_FORM: "False"
      ENABLE_PASSWORD_AUTH: "False"
      ENABLE_INITIAL_ADMIN_SIGNUP: "False"
      ENABLE_OAUTH_SIGNUP: "True"
      OAUTH_AUTO_REDIRECT: ${OPENWEBUI_OAUTH_AUTO_REDIRECT:-True}
      OAUTH_CLIENT_ID: ${YANCHUANER_AI_OAUTH_CLIENT_ID:?YANCHUANER_AI_OAUTH_CLIENT_ID is required}
      OAUTH_CLIENT_SECRET: ${YANCHUANER_AI_OAUTH_CLIENT_SECRET:?YANCHUANER_AI_OAUTH_CLIENT_SECRET is required}
      OPENID_PROVIDER_URL: ${YANCHUANER_OIDC_DISCOVERY_URL:-http://host.docker.internal:3000/api/oauth/.well-known/openid-configuration}
      OPENID_REDIRECT_URI: ${YANCHUANER_AI_OAUTH_REDIRECT_URI:-http://localhost:3001/oauth/oidc/callback}
      OAUTH_PROVIDER_NAME: "燕中校友"
      OAUTH_SCOPES: "openid profile email"
      OAUTH_SUB_CLAIM: sub
      OAUTH_USERNAME_CLAIM: preferred_username
      OAUTH_EMAIL_CLAIM: email
      ENABLE_OAUTH_ROLE_MANAGEMENT: "True"
      OAUTH_ROLES_CLAIM: role
      OAUTH_ALLOWED_ROLES: alumni,student,teacher
      OAUTH_ADMIN_ROLES: admin
      DEFAULT_USER_ROLE: user
      CORS_ALLOW_ORIGIN: ${OPENWEBUI_CORS_ALLOW_ORIGIN:-http://localhost:3000}
      USER_AGENT: ai-yanchuaner-open-webui/0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open_webui_data:/app/backend/data
    mem_limit: 1g
    logging: *default-logging
    networks:
      - ai-core
    ports:
      - "127.0.0.1:${OPENWEBUI_HOST_PORT:-3000}:8080"
    depends_on:
      litellm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

volumes:
  postgres_data:
  open_webui_data:

networks:
  data:
    internal: true
  ai-core:
    name: ${AI_CORE_NETWORK:-yanchuaner-ai-core}
    external: true
