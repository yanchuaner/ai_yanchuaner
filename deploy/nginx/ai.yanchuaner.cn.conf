# 本文件由 nginx.conf 的 http 块加载，因此可以在站点文件中声明限流区。
limit_req_zone $binary_remote_addr zone=ai_login:10m rate=5r/m;

server {
    listen 80;
    listen [::]:80;
    server_name ai.yanchuaner.cn;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.yanchuaner.cn;

    ssl_certificate /etc/letsencrypt/live/ai.yanchuaner.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.yanchuaner.cn/privkey.pem;

    client_max_body_size 25m;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 360s;
    proxy_send_timeout 360s;
    proxy_buffering off;

    location = /api/v1/auths/signin {
        limit_req zone=ai_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3001;
    }

    location / {
        # 网站占用 3000，Open WebUI 在同机部署时固定使用 3001。
        proxy_pass http://127.0.0.1:3001;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
}
